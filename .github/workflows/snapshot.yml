name: Snapshot top Hyperliquid traders

on:
  schedule:
    # Hourly, on the hour (UTC). GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      window:
        description: "Ranking window"
        default: "allTime"
        type: choice
        options: [day, week, month, allTime]
      top_n:
        description: "How many top traders to inspect"
        default: "10"

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch snapshot
        env:
          HL_WINDOW: ${{ github.event.inputs.window || 'allTime' }}
          HL_TOP_N: ${{ github.event.inputs.top_n || '10' }}
        run: python3 fetch_top_traders.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/ latest_traders.csv latest_positions.csv
          if git diff --staged --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "snapshot: top traders $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
